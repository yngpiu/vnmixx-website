name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check-types

      - name: Build
        run: pnpm build

  deploy:
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 30
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.VPS_APP_PATH }}"
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build mysql redis
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build api
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T api pnpm --filter api exec prisma migrate deploy
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build dashboard shop
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
