services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vnmixx-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SHOP_APP_BASE_URL: ${SHOP_APP_BASE_URL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      GHN_API_URL: ${GHN_API_URL:-}
      GHN_TOKEN: ${GHN_TOKEN:-}
      GHN_SHOP_ID: ${GHN_SHOP_ID:-}
      GHN_SHOP_DISTRICT_ID: ${GHN_SHOP_DISTRICT_ID:-}
      GHN_SHOP_WARD_ID: ${GHN_SHOP_WARD_ID:-}
      SEPAY_API_KEY: ${SEPAY_API_KEY:-}
      SEPAY_BANK_CODE: ${SEPAY_BANK_CODE:-}
      SEPAY_BANK_NAME: ${SEPAY_BANK_NAME:-}
      SEPAY_ACCOUNT_NUMBER: ${SEPAY_ACCOUNT_NUMBER:-}
      SEPAY_ACCOUNT_NAME: ${SEPAY_ACCOUNT_NAME:-}
      SEPAY_QR_TEMPLATE: ${SEPAY_QR_TEMPLATE:-compact}
      SEPAY_CHECKOUT_EXPIRE_MINUTES: ${SEPAY_CHECKOUT_EXPIRE_MINUTES:-15}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
    ports:
      - '4000:4000'

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${DASHBOARD_NEXT_PUBLIC_API_BASE_URL:-http://api:4000}
    container_name: vnmixx-dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${DASHBOARD_NEXT_PUBLIC_API_BASE_URL:-http://api:4000}
    ports:
      - '3000:3000'

  shop:
    build:
      context: .
      dockerfile: apps/shop/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${SHOP_NEXT_PUBLIC_API_BASE_URL:-http://api:4000}
        NEXT_PUBLIC_SITE_URL: ${SHOP_NEXT_PUBLIC_SITE_URL:-https://vnmixx.shop}
    container_name: vnmixx-shop
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_BASE_URL: ${SHOP_NEXT_PUBLIC_API_BASE_URL:-http://api:4000}
      NEXT_PUBLIC_SITE_URL: ${SHOP_NEXT_PUBLIC_SITE_URL:-https://vnmixx.shop}
    ports:
      - '3001:3001'
