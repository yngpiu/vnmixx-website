services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vnmixx-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379
    ports:
      - '4000:4000'

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: vnmixx-dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
    ports:
      - '3000:3000'

  shop:
    build:
      context: .
      dockerfile: apps/shop/Dockerfile
    container_name: vnmixx-shop
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
    ports:
      - '3001:3001'
